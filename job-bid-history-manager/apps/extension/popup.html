<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JBHM Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <img src="icons/icon48.png" alt="" width="32" height="32" class="popup-logo" />
      <h1>Job Bid Capture</h1>
      <p class="subtitle">Visible text only · sent to your web app</p>
    </header>

    <label>
      <span>Captured by</span>
      <input id="capturedBy" type="text" placeholder="Your name" autocomplete="name" />
    </label>

    <label>
      <span>Web app URL</span>
      <input id="apiBaseUrl" type="url" placeholder="http://localhost:3000" />
    </label>

    <label>
      <span>Capture token</span>
      <input
        id="captureToken"
        type="password"
        placeholder="jbhm_… from dashboard"
        autocomplete="off"
      />
    </label>

    <button id="saveSettings" type="button" class="secondary">Save settings</button>
    <button id="captureBtn" type="button" class="primary">Capture this page</button>

    <p id="status" class="status" role="status"></p>

    <footer>
      <small>Create token: Dashboard → Chrome extension · Right-click page to capture</small>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
