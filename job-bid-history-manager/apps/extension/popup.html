<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Bid Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <img src="icons/icon48.png" alt="" width="32" height="32" class="popup-logo" />
      <div>
        <h1>Job Bid Capture</h1>
        <p class="subtitle">Visible page text → team board</p>
      </div>
    </header>

    <div id="statusCard" class="status-card" role="status">
      <span id="statusLabel" class="status-label">Checking…</span>
      <p id="statusDetail" class="status-detail"></p>
    </div>

    <button id="captureBtn" type="button" class="primary" disabled>
      Capture this page
    </button>

    <div class="link-row">
      <button id="openDashboard" type="button" class="link-btn">Open Dashboard</button>
      <button id="openSettings" type="button" class="link-btn">Settings</button>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
