<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Bid Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <img src="icons/icon48.png" alt="" width="28" height="28" class="popup-logo" />
      <div>
        <h1>Job Bid Assistant</h1>
        <p class="subtitle">Popup launcher for workspace</p>
      </div>
    </header>

    <div id="statusCard" class="status-card" role="status">
      <span id="statusLabel" class="status-label">Checking…</span>
      <p id="statusDetail" class="status-detail"></p>
    </div>

    <button id="openWorkspaceBtn" type="button" class="primary">Open Workspace</button>
    <button id="captureBtn" type="button" class="secondary" disabled>Capture This Page</button>
    <button id="promptBtn" type="button" class="secondary" disabled>ChatGPT Prompt</button>
    <button id="downloadBtn" type="button" class="secondary" disabled>Download DOCX</button>

    <div class="link-row">
      <button id="openDashboard" type="button" class="link-btn">Dashboard</button>
      <button id="openSettings" type="button" class="link-btn">Settings</button>
    </div>

    <p id="hint" class="hint">Open Workspace to review before saving.</p>
    <p id="status" class="status" role="status" aria-live="polite"></p>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
