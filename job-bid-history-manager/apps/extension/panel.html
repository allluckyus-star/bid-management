<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Bid Assistant Workspace</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="panel-header">
      <div class="panel-header-text">
        <h1>Job Bid Assistant</h1>
        <p id="siteMeta" class="meta">Current page</p>
      </div>
      <div class="header-actions">
        <span id="connBadge" class="badge">Checking…</span>
      </div>
    </header>

    <div id="panelStatus" class="panel-status" role="status" aria-live="polite" hidden></div>

    <div class="workspace-main">
      <nav class="side-nav" id="sideNav" aria-label="Workspace sections">
        <button type="button" class="side-nav-toggle" id="sideNavToggle" aria-label="Show content" aria-expanded="true" title="Show content">
          <svg class="side-nav-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="side-nav-items" id="sideNavItems"></div>
      </nav>
      <main id="tabContent" class="content"></main>
    </div>

    <footer class="action-bar">
      <button id="gptPromptBtn" type="button" class="btn-action primary">GPT Prompt</button>
      <button id="gptResultBtn" type="button" class="btn-action secondary">GPT Result</button>
      <button id="footerDownloadBtn" type="button" class="btn-action secondary">Download</button>
      <button id="footerDashboardBtn" type="button" class="btn-action secondary">Dashboard</button>
    </footer>

    <script src="config.js"></script>
    <script src="prompt-defaults.js"></script>
    <script src="local-prompt.js"></script>
    <script src="local-storage.js"></script>
    <script src="resume-library.js"></script>
    <script src="storage.js"></script>
    <script src="api.js"></script>
    <script src="download-path.js"></script>
    <script src="vendor/jszip.min.js"></script>
    <script src="file-text-extract.js"></script>
    <script src="panel.js"></script>
    <script src="panel-jd-tab.js"></script>
    <script src="panel-preview-tab.js"></script>
  </body>
</html>
